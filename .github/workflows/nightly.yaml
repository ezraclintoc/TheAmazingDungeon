name: Nightly Build

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            binary: bevy_ldtk_procgen
          - os: windows-latest
            name: windows
            binary: bevy_ldtk_procgen.exe
          - os: macos-latest
            name: macos
            binary: bevy_ldtk_procgen
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Bevy system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bevy_ldtk_procgen-${{ matrix.name }}-${{ github.sha }}
          path: |
            target/release/${{ matrix.binary }}
            assets/